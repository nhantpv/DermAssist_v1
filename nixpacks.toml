# Nixpacks build config for Railway. Pyproject says `requires-python = ">=3.11"`;
# we pin python311 here to match the floor and keep wheel availability stable.
# postgresql brings the libpq client (`psql`) needed by scripts/run_migrations.sh.

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "postgresql"]

[phases.install]
cmds = ["pip install -e .[dev]"]
