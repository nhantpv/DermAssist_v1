<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DermAssist VN — Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-4xl mx-auto px-6 py-3 flex items-center justify-between">
            <a href="/" class="font-semibold text-lg text-gray-900">DermAssist VN</a>
            {% if request.session.get('username') %}
            <div class="flex items-center gap-4">
                <a href="/upload" class="text-sm text-gray-700 hover:text-blue-600">Tải ảnh mới</a>
                <a href="/encounters" class="text-sm text-gray-700 hover:text-blue-600">Lịch sử</a>
                <span class="text-sm text-gray-500">({{ request.session.get('username') }})</span>
                <form method="post" action="/logout" class="inline">
                    <button type="submit" class="text-sm text-gray-700 hover:text-red-600">Đăng xuất</button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="flex-1 max-w-4xl w-full mx-auto p-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-xs text-gray-400 py-4">
        Demo — không dùng cho chẩn đoán thực tế.
    </footer>
</body>
</html>
