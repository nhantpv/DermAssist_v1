{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white rounded-lg shadow-sm border border-gray-200 p-8">
    <h1 class="text-xl font-semibold mb-6 text-center">Đăng nhập</h1>

    {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="username">Tên đăng nhập</label>
            <input type="text" id="username" name="username" required autofocus
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Mật khẩu</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition">
            Đăng nhập
        </button>
    </form>

    <p class="text-xs text-gray-500 mt-6 text-center">
        Tài khoản demo: <code class="bg-gray-100 px-1 rounded">demo</code> / <code class="bg-gray-100 px-1 rounded">demo</code>
    </p>
</div>
{% endblock %}
