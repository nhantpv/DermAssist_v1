{% extends "base.html" %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
    <h1 class="text-xl font-semibold mb-6">Tải ảnh tổn thương da</h1>

    {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/upload" enctype="multipart/form-data" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="image">Ảnh tổn thương</label>
            <input type="file" id="image" name="image" accept="image/*" required
                   class="w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            <p class="text-xs text-gray-500 mt-1">Ảnh tối đa 8 MB. Hỗ trợ JPEG/PNG/WebP.</p>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="clinical_note">Ghi chú lâm sàng (tuỳ chọn)</label>
            <textarea id="clinical_note" name="clinical_note" rows="4"
                      placeholder="Triệu chứng kèm theo, thời gian khởi phát, vị trí, tiền sử…"
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <button type="submit"
                onclick="this.disabled=true;this.innerText='Đang phân tích…';this.form.submit();"
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 disabled:cursor-wait text-white font-medium py-2 rounded-md transition">
            Phân tích
        </button>
    </form>
</div>
{% endblock %}
