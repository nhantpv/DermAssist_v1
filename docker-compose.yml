services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dermassist
      POSTGRES_PASSWORD: dermassist_dev
      POSTGRES_DB: dermassist
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dermassist"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
